name: 'VerdictOS Security Scan'
description: 'Scan your codebase for security vulnerabilities in AI-generated code'
author: 'VerdictOS'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  path:
    description: 'Path to scan (default: current directory)'
    required: false
    default: '.'
  url:
    description: 'Optional live URL to probe for runtime issues'
    required: false
  block-on-critical:
    description: 'Fail the build if CRITICAL issues found'
    required: false
    default: 'true'
  block-on-high:
    description: 'Fail the build if HIGH issues found'
    required: false
    default: 'false'
  json-output:
    description: 'Output results as JSON'
    required: false
    default: 'false'

outputs:
  critical-count:
    description: 'Number of CRITICAL issues found'
  high-count:
    description: 'Number of HIGH issues found'
  medium-count:
    description: 'Number of MEDIUM issues found'
  low-count:
    description: 'Number of LOW issues found'
  risk-score:
    description: 'Total risk score'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install VerdictOS Scan
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install verdictos-scan requests
    
    - name: Run Security Scan
      shell: bash
      id: scan
      run: |
        SCAN_ARGS="--path ${{ inputs.path }}"
        
        if [ -n "${{ inputs.url }}" ]; then
          SCAN_ARGS="$SCAN_ARGS --url ${{ inputs.url }}"
        fi
        
        if [ "${{ inputs.json-output }}" = "true" ]; then
          SCAN_ARGS="$SCAN_ARGS --json"
        fi
        
        # Run scan and capture output
        verdictos-scan $SCAN_ARGS > scan_results.txt 2>&1 || true
        
        cat scan_results.txt
        
        # Parse results (simple grep for counts)
        CRITICAL=$(grep -oP 'CRITICAL: \K\d+' scan_results.txt || echo "0")
        HIGH=$(grep -oP 'HIGH: \K\d+' scan_results.txt || echo "0")
        MEDIUM=$(grep -oP 'MEDIUM: \K\d+' scan_results.txt || echo "0")
        LOW=$(grep -oP 'LOW: \K\d+' scan_results.txt || echo "0")
        RISK=$(grep -oP 'RISK SCORE: \K\d+' scan_results.txt || echo "0")
        
        echo "critical-count=$CRITICAL" >> $GITHUB_OUTPUT
        echo "high-count=$HIGH" >> $GITHUB_OUTPUT
        echo "medium-count=$MEDIUM" >> $GITHUB_OUTPUT
        echo "low-count=$LOW" >> $GITHUB_OUTPUT
        echo "risk-score=$RISK" >> $GITHUB_OUTPUT
        
        # Decide if we should fail
        SHOULD_FAIL=false
        
        if [ "${{ inputs.block-on-critical }}" = "true" ] && [ "$CRITICAL" -gt "0" ]; then
          echo "❌ Build blocked: $CRITICAL CRITICAL issues found"
          SHOULD_FAIL=true
        fi
        
        if [ "${{ inputs.block-on-high }}" = "true" ] && [ "$HIGH" -gt "0" ]; then
          echo "❌ Build blocked: $HIGH HIGH issues found"
          SHOULD_FAIL=true
        fi
        
        if [ "$SHOULD_FAIL" = "true" ]; then
          exit 1
        fi
        
        echo "✅ Security scan complete"
